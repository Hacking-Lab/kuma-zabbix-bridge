[zabbix]
url = https://zabbix.example.com/api_jsonrpc.php
token = <removed>
cache_ttl_seconds = 3600
ca_bundle = /usr/local/share/ca-certificates/ca-certificates.crt


[flask]
host = 0.0.0.0
port = 8080
base_url = http://kuma-python-flask:8080

[kuma]
enabled = true
url = https://kuma.example.com
username = <removed>
password = <removed>
sync_token = <removed>
monitor_interval = 300
monitor_retry_interval = 60
monitor_max_retries = 3
delete_missing = false

[monitoring]
service_whitelist =
    sshd*not running
    http*not running
    nginx*not running
    traefik*not running
    docker*not running
    gitlab-runner*not running
host_denylist =
    *test*
    
only_problem_triggers = false
